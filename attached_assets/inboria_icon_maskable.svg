  <!-- Envelope flap triangle above the I (scaled to safe-zone) -->
  <polygon points="422,380 602,380 512,470" fill="#ffffff"/>
  <!-- I vertical stroke (safe-zone) -->
  <rect x="468" y="495" width="88" height="290" rx="10" ry="10" fill="#ffffff"/>
</svg>
