name: Build app de bureau Inboria

# Lance la fabrication des installateurs Windows / macOS / Linux.
# Déclenché en poussant un tag de version (ex: v1.0.0) ou manuellement.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    defaults:
      run:
        working-directory: artifacts/inboria-desktop

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances
        run: npm install

      - name: Fabriquer les installateurs
        # INBORIA_URL : domaine publié de l'app web (à définir en secret repo).
        # --publish never : la publication est gérée par le job "release" dédié
        # (évite toute publication en double / course entre les jobs).
        env:
          INBORIA_URL: ${{ secrets.INBORIA_URL }}
        run: npm run dist -- --publish never

      - name: Publier les installateurs
        uses: actions/upload-artifact@v4
        with:
          name: inboria-desktop-${{ matrix.os }}
          path: |
            artifacts/inboria-desktop/release/*.exe
            artifacts/inboria-desktop/release/*.dmg
            artifacts/inboria-desktop/release/*.zip
            artifacts/inboria-desktop/release/*.AppImage
            artifacts/inboria-desktop/release/*.deb
          if-no-files-found: ignore

  release:
    name: Créer la Release GitHub
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Récupérer les installateurs
        uses: actions/download-artifact@v4
        with:
          path: installers

      - name: Publier la Release
        uses: softprops/action-gh-release@v2
        with:
          files: installers/**/*
          generate_release_notes: true
