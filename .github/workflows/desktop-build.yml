name: Build app de bureau Inboria

# Lance la fabrication des installateurs Windows / macOS / Linux.
# Déclenché en poussant un tag de version (ex: v1.0.0) ou manuellement.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    defaults:
      run:
        working-directory: artifacts/inboria-desktop

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances
        run: npm install

      # La version de l'app DOIT correspondre au tag (ex: tag v1.2.0 → 1.2.0).
      # C'est cette version que la mise à jour automatique compare pour savoir
      # si une release est plus récente que l'app installée.
      - name: Aligner la version sur le tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Fabriquer les installateurs
        # INBORIA_URL : domaine publié de l'app web (à définir en secret repo).
        # --publish never : la publication est gérée par le job "release" dédié
        # (évite toute publication en double / course entre les jobs).
        env:
          INBORIA_URL: ${{ secrets.INBORIA_URL }}
        run: npm run dist -- --publish never

      - name: Publier les installateurs
        uses: actions/upload-artifact@v4
        with:
          name: inboria-desktop-${{ matrix.os }}
          path: |
            artifacts/inboria-desktop/release/*.exe
            artifacts/inboria-desktop/release/*.dmg
            artifacts/inboria-desktop/release/*.zip
            artifacts/inboria-desktop/release/*.AppImage
            artifacts/inboria-desktop/release/*.deb
            artifacts/inboria-desktop/release/*.yml
            artifacts/inboria-desktop/release/*.blockmap
          if-no-files-found: ignore

  release:
    name: Créer la Release GitHub
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Récupérer les installateurs
        uses: actions/download-artifact@v4
        with:
          path: installers

      # IMPORTANT (auto-update) : pas de "repository:" ici → la release est créée
      # dans le repo COURANT du workflow. Ce repo DOIT être INBORIA/inboria-releases,
      # c.-à-d. le même que la config "publish" d'electron-builder.yml, sinon
      # l'app chercherait les métadonnées de mise à jour (latest.yml / latest-linux.yml)
      # à un endroit où les installateurs n'ont pas été publiés → auto-update cassé.
      - name: Publier la Release
        uses: softprops/action-gh-release@v2
        with:
          files: installers/**/*
          generate_release_notes: true
