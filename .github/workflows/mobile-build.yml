name: Build apps mobiles Inboria

# Fabrique les apps mobiles Inboria (Capacitor) :
#  - Android  : APK + AAB (l'AAB est le format requis par le Play Store).
#  - iOS      : vérification de compilation par défaut ; build signé + envoi
#               App Store Connect (TestFlight) dès que les secrets Apple sont présents.
#
# IMPORTANT — limites honnêtes :
#  - Un .ipa installable / publiable sur l'App Store NE PEUT être produit que sur
#    macOS AVEC un compte Apple Developer (~99 $/an) et une clé API App Store Connect.
#  - Tant que ces secrets sont absents (compte Apple pas encore validé), le job iOS
#    se limite à vérifier que le projet compile — comportement inchangé.
#  - Secrets à ajouter côté repo pour activer la signature (voir le job iOS) :
#      APPLE_TEAM_ID, ASC_KEY_ID, ASC_ISSUER_ID, ASC_API_KEY_BASE64.
#  - L'AAB doit être signé avec votre keystore Android avant publication sur le
#    Play Store (compte Google Play, 25 $ une fois). Ici on produit un AAB non signé.
#  - INBORIA_URL (secret repo) = domaine publié de l'app web Inboria que les apps
#    chargent. À défaut, la valeur de capacitor.config.json est utilisée.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

defaults:
  run:
    working-directory: artifacts/inboria-mobile-app

jobs:
  android:
    name: Android (APK + AAB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configurer Java (requis par Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Installer les dépendances
        run: npm install

      - name: Vérifier le secret INBORIA_URL
        # Obligatoire : sans lui l'app serait packagée vers l'URL placeholder
        # de capacitor.config.json et serait inutilisable.
        env:
          INBORIA_URL: ${{ secrets.INBORIA_URL }}
        run: |
          if [ -z "$INBORIA_URL" ]; then
            echo "::error::Le secret repo INBORIA_URL est manquant (domaine publié de l'app web Inboria)."
            exit 1
          fi

      - name: Pointer l'app vers le domaine Inboria publié
        env:
          INBORIA_URL: ${{ secrets.INBORIA_URL }}
        run: |
          node -e "const fs=require('fs');const p='capacitor.config.json';const c=JSON.parse(fs.readFileSync(p));c.server=c.server||{};c.server.url=process.env.INBORIA_URL;fs.writeFileSync(p,JSON.stringify(c,null,2));"

      - name: Générer le projet Android
        run: npx cap add android

      - name: Synchroniser Capacitor
        run: npx cap sync android

      - name: Déclarer « Partager vers Inboria » (menu de partage Android)
        # Le projet android/ est régénéré à chaque build (cap add android), donc
        # on injecte ici l'activité du plugin send-intent + ses filtres d'intent
        # dans AndroidManifest.xml : c'est ce qui fait apparaître Inboria dans le
        # menu « Partager » du téléphone (photos, fichiers, texte). Côté web,
        # inboria.com lit l'intent via window.Capacitor.Plugins.SendIntent et
        # ouvre le composeur avec la pièce jointe.
        run: |
          node -e "
          const fs = require('fs');
          const p = 'android/app/src/main/AndroidManifest.xml';
          let xml = fs.readFileSync(p, 'utf8');
          if (xml.includes('de.mindlib.sendIntent.SendIntentActivity')) {
            console.log('SendIntentActivity déjà présent — rien à faire.');
            process.exit(0);
          }
          const activity = [
            '        <activity',
            '            android:name=\"de.mindlib.sendIntent.SendIntentActivity\"',
            '            android:label=\"@string/app_name\"',
            '            android:exported=\"true\"',
            '            android:theme=\"@style/AppTheme.NoActionBarLaunch\">',
            '            <intent-filter>',
            '                <action android:name=\"android.intent.action.SEND\" />',
            '                <category android:name=\"android.intent.category.DEFAULT\" />',
            '                <data android:mimeType=\"text/plain\" />',
            '            </intent-filter>',
            '            <intent-filter>',
            '                <action android:name=\"android.intent.action.SEND\" />',
            '                <category android:name=\"android.intent.category.DEFAULT\" />',
            '                <data android:mimeType=\"image/*\" />',
            '                <data android:mimeType=\"video/*\" />',
            '                <data android:mimeType=\"audio/*\" />',
            '                <data android:mimeType=\"application/*\" />',
            '                <data android:mimeType=\"text/*\" />',
            '            </intent-filter>',
            '            <intent-filter>',
            '                <action android:name=\"android.intent.action.SEND_MULTIPLE\" />',
            '                <category android:name=\"android.intent.category.DEFAULT\" />',
            '                <data android:mimeType=\"image/*\" />',
            '                <data android:mimeType=\"application/*\" />',
            '            </intent-filter>',
            '        </activity>',
            ''
          ].join('\n');
          if (!xml.includes('</application>')) {
            console.error('Balise </application> introuvable dans le manifest.');
            process.exit(1);
          }
          xml = xml.replace('</application>', activity + '    </application>');
          fs.writeFileSync(p, xml);
          console.log('SendIntentActivity injectée dans AndroidManifest.xml ✅');
          "
          grep -q 'SendIntentActivity' android/app/src/main/AndroidManifest.xml && echo 'Vérification OK'

      - name: Générer les icônes et splash screens (icône Inboria officielle)
        # Corrige le rejet Google Play « App store listing mismatch » : sans cette
        # étape, l'app embarquait l'icône Capacitor par défaut, différente de
        # l'icône de la fiche Play Store. Les sources sont dans assets/
        # (icon-only / icon-foreground / icon-background / splash), générées
        # depuis docs/play-store-assets/icon-512-fullbleed.png.
        run: npx capacitor-assets generate --android

      - name: Cibler API 36 + incrémenter le versionCode (exigences Play Store 2026)
        run: |
          cd android
          sed -i -E 's/compileSdkVersion = [0-9]+/compileSdkVersion = 36/' variables.gradle
          sed -i -E 's/targetSdkVersion = [0-9]+/targetSdkVersion = 36/' variables.gradle
          grep -q "suppressUnsupportedCompileSdk" gradle.properties 2>/dev/null || echo "android.suppressUnsupportedCompileSdk=36" >> gradle.properties
          # versionCode unique et toujours croissant = numéro de build GitHub (jamais réutilisé par Play)
          sed -i -E "s/versionCode [0-9]+/versionCode ${GITHUB_RUN_NUMBER}/" app/build.gradle
          echo "--- variables.gradle ---"; cat variables.gradle
          echo "--- app/build.gradle versions ---"; grep -E "versionCode|versionName" app/build.gradle

      - name: Construire l'APK et l'AAB (release)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Décoder la clé de signature (upload key Play App Signing)
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "Keystore décodé."
          else
            echo "::warning::Secret ANDROID_KEYSTORE_BASE64 absent — l'AAB restera NON signé et ne pourra PAS être publié sur le Play Store. Ajoute la clé en secret repo puis relance."
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Signer l'AAB (et l'APK) avec la clé d'upload
        if: steps.keystore.outputs.present == 'true'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          AAB=android/app/build/outputs/bundle/release/app-release.aab
          if [ ! -f "$AAB" ]; then
            echo "::error::AAB introuvable à $AAB"; exit 1
          fi
          jarsigner -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore "$RUNNER_TEMP/upload-keystore.jks" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            "$AAB" "$ANDROID_KEY_ALIAS"
          jarsigner -verify "$AAB" && echo "✅ AAB signé et vérifié — prêt pour le Play Store."

      - name: Publier les binaires Android
        uses: actions/upload-artifact@v4
        with:
          name: inboria-android
          path: |
            artifacts/inboria-mobile-app/android/app/build/outputs/apk/release/*.apk
            artifacts/inboria-mobile-app/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn

  ios:
    name: iOS (vérification de compilation)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Installer les dépendances
        run: npm install

      - name: Vérifier le secret INBORIA_URL
        env:
          INBORIA_URL: ${{ secrets.INBORIA_URL }}
        run: |
          if [ -z "$INBORIA_URL" ]; then
            echo "::error::Le secret repo INBORIA_URL est manquant (domaine publié de l'app web Inboria)."
            exit 1
          fi

      - name: Pointer l'app vers le domaine Inboria publié
        env:
          INBORIA_URL: ${{ secrets.INBORIA_URL }}
        run: |
          node -e "const fs=require('fs');const p='capacitor.config.json';const c=JSON.parse(fs.readFileSync(p));c.server=c.server||{};c.server.url=process.env.INBORIA_URL;fs.writeFileSync(p,JSON.stringify(c,null,2));"

      - name: Générer le projet iOS
        run: npx cap add ios

      - name: Synchroniser Capacitor
        run: npx cap sync ios

      - name: Générer les icônes et splash screens (icône Inboria officielle)
        run: npx capacitor-assets generate --ios

      # Détecte si les secrets de signature Apple sont configurés. Tant que le compte
      # Apple Developer n'est pas validé, ils seront absents → on retombe sur la simple
      # vérification de compilation (sans signature), exactement comme avant.
      - name: Détecter les secrets de signature Apple
        id: applesign
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$ASC_API_KEY_BASE64" ] && [ -n "$ASC_KEY_ID" ] && [ -n "$ASC_ISSUER_ID" ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "✅ Secrets Apple présents — build signé + envoi App Store Connect."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Secrets de signature Apple absents — build de vérification uniquement (pas de .ipa publiable). À ajouter dès qu'Apple aura validé le compte : APPLE_TEAM_ID, ASC_KEY_ID, ASC_ISSUER_ID, ASC_API_KEY_BASE64."
          fi

      # ---- Cas 1 : pas encore de secrets → simple vérification de compilation ----
      - name: Vérifier que le projet iOS compile (simulateur, sans signature)
        if: steps.applesign.outputs.present == 'false'
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      # ---- Cas 2 : secrets présents → archive signée + export .ipa + envoi ASC ----
      # Signature « automatique » pilotée par la clé API App Store Connect :
      # Xcode crée/télécharge tout seul le certificat de distribution et le profil
      # (option -allowProvisioningUpdates). Aucun certificat/profil à gérer à la main.
      - name: Préparer la clé API App Store Connect
        if: steps.applesign.outputs.present == 'true'
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p "$HOME/private_keys" "$HOME/.appstoreconnect/private_keys"
          KEY_DEST="$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          # macOS = base64 BSD (-D), Linux = GNU (--decode/-d). On tente les variantes.
          echo "$ASC_API_KEY_BASE64" | base64 -D > "$KEY_DEST" 2>/dev/null \
            || echo "$ASC_API_KEY_BASE64" | base64 --decode > "$KEY_DEST" 2>/dev/null \
            || echo "$ASC_API_KEY_BASE64" | base64 -d > "$KEY_DEST"
          if [ ! -s "$KEY_DEST" ]; then
            echo "::error::Décodage de ASC_API_KEY_BASE64 échoué ou clé vide. Vérifie que le secret contient bien le .p8 encodé en base64 (base64 -w0 AuthKey_XXXX.p8)."
            exit 1
          fi
          cp "$KEY_DEST" "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          echo "KEY_PATH=$KEY_DEST" >> "$GITHUB_ENV"

      - name: Archiver l'app (signature automatique via clé API)
        if: steps.applesign.outputs.present == 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Inboria.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            archive

      - name: Générer ExportOptions.plist
        if: steps.applesign.outputs.present == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>destination</key>
            <string>export</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Exporter le .ipa signé
        if: steps.applesign.outputs.present == 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          cd ios/App
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/Inboria.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Envoyer sur App Store Connect (TestFlight)
        if: steps.applesign.outputs.present == 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          IPA=$(ls "$RUNNER_TEMP/export"/*.ipa 2>/dev/null | head -n1)
          if [ -z "$IPA" ]; then echo "::error::.ipa introuvable après export"; exit 1; fi
          echo "Envoi de $IPA vers App Store Connect…"
          xcrun altool --upload-app -t ios -f "$IPA" \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"

      - name: Publier le .ipa comme artefact
        if: steps.applesign.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: inboria-ios
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: warn
