name: Build apps mobiles Inboria

# Fabrique les apps mobiles Inboria (Capacitor) :
#  - Android  : APK + AAB (l'AAB est le format requis par le Play Store).
#  - iOS      : vérification de compilation (build simulateur, sans signature).
#
# IMPORTANT — limites honnêtes :
#  - Un .ipa installable / publiable sur l'App Store NE PEUT être produit que sur
#    macOS AVEC un compte Apple Developer (~99 $/an) et les certificats/profils de
#    signature du compte. Ce workflow vérifie seulement que le projet iOS compile.
#  - L'AAB doit être signé avec votre keystore Android avant publication sur le
#    Play Store (compte Google Play, 25 $ une fois). Ici on produit un AAB non signé.
#  - INBORIA_URL (secret repo) = domaine publié de l'app web Inboria que les apps
#    chargent. À défaut, la valeur de capacitor.config.json est utilisée.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

defaults:
  run:
    working-directory: artifacts/inboria-mobile-app

jobs:
  android:
    name: Android (APK + AAB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configurer Java (requis par Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Installer les dépendances
        run: npm install

      - name: Vérifier le secret INBORIA_URL
        # Obligatoire : sans lui l'app serait packagée vers l'URL placeholder
        # de capacitor.config.json et serait inutilisable.
        env:
          INBORIA_URL: ${{ secrets.INBORIA_URL }}
        run: |
          if [ -z "$INBORIA_URL" ]; then
            echo "::error::Le secret repo INBORIA_URL est manquant (domaine publié de l'app web Inboria)."
            exit 1
          fi

      - name: Pointer l'app vers le domaine Inboria publié
        env:
          INBORIA_URL: ${{ secrets.INBORIA_URL }}
        run: |
          node -e "const fs=require('fs');const p='capacitor.config.json';const c=JSON.parse(fs.readFileSync(p));c.server=c.server||{};c.server.url=process.env.INBORIA_URL;fs.writeFileSync(p,JSON.stringify(c,null,2));"

      - name: Générer le projet Android
        run: npx cap add android

      - name: Synchroniser Capacitor
        run: npx cap sync android

      - name: Construire l'APK et l'AAB (release)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Décoder la clé de signature (upload key Play App Signing)
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "Keystore décodé."
          else
            echo "::warning::Secret ANDROID_KEYSTORE_BASE64 absent — l'AAB restera NON signé et ne pourra PAS être publié sur le Play Store. Ajoute la clé en secret repo puis relance."
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Signer l'AAB (et l'APK) avec la clé d'upload
        if: steps.keystore.outputs.present == 'true'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          AAB=android/app/build/outputs/bundle/release/app-release.aab
          if [ ! -f "$AAB" ]; then
            echo "::error::AAB introuvable à $AAB"; exit 1
          fi
          jarsigner -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore "$RUNNER_TEMP/upload-keystore.jks" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            "$AAB" "$ANDROID_KEY_ALIAS"
          jarsigner -verify "$AAB" && echo "✅ AAB signé et vérifié — prêt pour le Play Store."

      - name: Publier les binaires Android
        uses: actions/upload-artifact@v4
        with:
          name: inboria-android
          path: |
            artifacts/inboria-mobile-app/android/app/build/outputs/apk/release/*.apk
            artifacts/inboria-mobile-app/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn

  ios:
    name: iOS (vérification de compilation)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer les dépendances
        run: npm install

      - name: Vérifier le secret INBORIA_URL
        env:
          INBORIA_URL: ${{ secrets.INBORIA_URL }}
        run: |
          if [ -z "$INBORIA_URL" ]; then
            echo "::error::Le secret repo INBORIA_URL est manquant (domaine publié de l'app web Inboria)."
            exit 1
          fi

      - name: Pointer l'app vers le domaine Inboria publié
        env:
          INBORIA_URL: ${{ secrets.INBORIA_URL }}
        run: |
          node -e "const fs=require('fs');const p='capacitor.config.json';const c=JSON.parse(fs.readFileSync(p));c.server=c.server||{};c.server.url=process.env.INBORIA_URL;fs.writeFileSync(p,JSON.stringify(c,null,2));"

      - name: Générer le projet iOS
        run: npx cap add ios

      - name: Synchroniser Capacitor
        run: npx cap sync ios

      - name: Vérifier que le projet iOS compile (simulateur, sans signature)
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
