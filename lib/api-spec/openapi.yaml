  /appointments/propose:
    post:
      operationId: proposeMeeting
      tags: [appointments]
      summary: Inboria proposes a 1:1 meeting (RDV Phase 3 #261)
      description: |
        Creates a `pending` appointment, sends a proposal email to the contact
        from the user's primary connected mailbox (Gmail/Outlook/SMTP), stores
        the proposal Message-ID for reply detection, and schedules an auto
        reminder at +48h if the user has it enabled.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, subject, startAt, endAt]
              properties:
                to:
                  type: string
                  format: email
                contactName:
                  type: string
                subject:
                  type: string
                startAt:
                  type: string
                  format: date-time
                endAt:
                  type: string
                  format: date-time
                location:
                  type: ["string", "null"]
                description:
                  type: ["string", "null"]
                lang:
                  type: string
      responses:
        "201":
          description: Created proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "400":
          description: Invalid payload
        "502":
          description: Email send failed

