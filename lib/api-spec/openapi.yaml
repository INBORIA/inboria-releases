openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: NCV Mail API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: emails
    description: Email operations
  - name: categories
    description: Category operations
  - name: tasks
    description: Task operations
  - name: profile
    description: User profile operations
  - name: dashboard
    description: Dashboard summary operations
  - name: projects
    description: Project management operations
  - name: ai
    description: AI operations
  - name: followups
    description: Follow-up tracking operations
  - name: export
    description: Data export operations
  - name: paddle
    description: Paddle payment operations
  - name: integrations
    description: Third-party integration operations
  - name: organisations
    description: Organisation and team management operations
  - name: shared-mailboxes
    description: Shared mailbox operations
  - name: autopilot
    description: Autopilot live activity operations
  - name: notifications
    description: Notification operations
  - name: team
    description: Team dashboard operations
  - name: appointments
    description: Appointment/calendar operations
  - name: inboria
    description: Inboria contextual memory operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid input

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

    patch:
      operationId: updateProfile
      tags: [profile]
      summary: Update profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /profile/push-token:
    post:
      operationId: registerPushToken
      tags: [profile]
      summary: Register push notification token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPushTokenBody"
      responses:
        "200":
          description: Token registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /emails:
    get:
      operationId: listEmails
      tags: [emails]
      summary: List emails
      parameters:
        - name: priority
          in: query
          schema:
            type: string
            enum: [urgent, moyen, faible]
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [non_lu, read, unread, archived, trashed, spam]
        - name: q
          in: query
          schema:
            type: string
          description: Search term to filter emails by subject, sender or summary
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number (1-indexed)
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
          description: Number of emails per page
        - name: crmFilter
          in: query
          schema:
            type: string
            enum: [hubspot, pipedrive, salesforce, odoo]
          description: Restrict to senders present in the user's CRM contacts for the given provider
        - name: sort
          in: query
          schema:
            type: string
            enum: [smart]
          description: When set to "smart", emails are sorted by Inboria strategic score
      responses:
        "200":
          description: Paginated list of emails
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedEmails"

  /emails/{id}:
    get:
      operationId: getEmail
      tags: [emails]
      summary: Get single email
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Email"
        "404":
          description: Not found

    patch:
      operationId: updateEmail
      tags: [emails]
      summary: Update email category or status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmailBody"
      responses:
        "200":
          description: Updated email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Email"

    delete:
      operationId: deleteEmail
      tags: [emails]
      summary: Delete an email
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /emails/{id}/restore:
    post:
      operationId: restoreEmail
      tags: [emails]
      summary: Restore a trashed email to inbox
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email restored
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /emails/{id}/permanent:
    delete:
      operationId: permanentDeleteEmail
      tags: [emails]
      summary: Permanently delete a trashed email
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email permanently deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /emails/trash/empty:
    delete:
      operationId: emptyTrash
      tags: [emails]
      summary: Permanently delete all trashed emails
      responses:
        "200":
          description: Trash emptied
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /emails/spam/empty:
    delete:
      operationId: emptySpam
      tags: [emails]
      summary: Permanently delete all spam emails
      responses:
        "200":
          description: Spam emptied
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /emails/spam/count:
    get:
      operationId: getSpamCount
      tags: [emails]
      summary: Number of emails in junk folder (sidebar counter)
      responses:
        "200":
          description: Spam count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpamCount"

  /autopilot/activity:
    get:
      operationId: getAutopilotActivity
      tags: [autopilot]
      summary: Get today's autopilot counts and the last 24h timeline
      responses:
        "200":
          description: Activity snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutopilotActivity"

  /senders/blocked:
    get:
      operationId: listBlockedSenders
      tags: [senders]
      summary: List blocked senders
      parameters:
        - name: connectionId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Blocked senders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlockedSender"

  /senders/block:
    post:
      operationId: blockSender
      tags: [senders]
      summary: Block a sender on the provider and locally
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, connectionId]
              properties:
                email:
                  type: string
                connectionId:
                  type: string
                scope:
                  type: string
                  enum: [connection, all_accounts]
      responses:
        "200":
          description: Blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockSenderResult"

  /senders/blocked/{id}:
    delete:
      operationId: unblockSender
      tags: [senders]
      summary: Unblock a sender
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unblocked
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  providerSync:
                    type: boolean

  /emails/bulk:
    post:
      operationId: bulkUpdateEmails
      tags: [emails]
      summary: Bulk update emails (archive, mark read, delete)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
                - action
              properties:
                ids:
                  type: array
                  items:
                    type: integer
                action:
                  type: string
                  enum: [delete, archive, read]
      responses:
        "200":
          description: Bulk action result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  affected:
                    type: integer

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

    post:
      operationId: createCategory
      tags: [categories]
      summary: Create category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryBody"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /categories/apply-pack:
    post:
      operationId: applyPack
      tags: [categories]
      summary: Apply a profession pack (bulk insert categories)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyPackBody"
      responses:
        "200":
          description: Pack applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplyPackResponse"

  /categories/generate-pack:
    post:
      operationId: generatePack
      tags: [categories]
      summary: Generate a custom pack via AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratePackBody"
      responses:
        "200":
          description: Generated pack
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratePackResponse"

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [all, pending, done]
        - name: scope
          in: query
          description: |
            mine (default) = tasks I created or am assigned to;
            assigned_to_me = only tasks assigned to me;
            created_by_me = only tasks I created;
            team = all tasks of my organisation members.
          schema:
            type: string
            enum: [mine, assigned_to_me, created_by_me, team]
        - name: projectId
          in: query
          description: Restrict to tasks of a given project.
          schema:
            type: string
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update task (toggle done)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/inbox-health:
    get:
      operationId: getInboxHealth
      tags: [dashboard]
      summary: Inbox health score
      responses:
        "200":
          description: Inbox health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboxHealth"

  /dashboard/category-counts:
    get:
      operationId: getCategoryCounts
      tags: [dashboard]
      summary: Email counts per category
      parameters:
        - in: query
          name: scope
          required: false
          schema:
            type: string
            enum: [personal, shared, all]
          description: Scope du compteur — personal=perso uniquement, shared=boîte partagée (sharedMailboxId requis), all=pooled (défaut)
        - in: query
          name: sharedMailboxId
          required: false
          schema:
            type: string
          description: ID de la boîte partagée quand scope=shared
        - in: query
          name: accountEmail
          required: false
          schema:
            type: string
          description: Filtre par adresse destinataire (scope=personal) — aligne le compteur sur le filtre "compte" de la liste
      responses:
        "200":
          description: Category counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryCount"

  /dashboard/bootstrap:
    get:
      operationId: getDashboardBootstrap
      tags: [dashboard]
      summary: One-shot dashboard bootstrap aggregator
      description: |
        Returns all the slow-moving dashboard "socle" data in a single
        roundtrip — profile, organisation, organisation members, shared
        mailboxes, projects, integrations and the dashboard summary —
        used by the inbox to seed the React Query cache and avoid the
        ~10 parallel calls usually issued at first paint.
      responses:
        "200":
          description: Bootstrap payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardBootstrap"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

    post:
      operationId: createProject
      tags: [projects]
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project with emails and tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          description: Not found

    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectBody"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /projects/{id}/notes:
    get:
      operationId: listProjectNotes
      tags: [projects]
      summary: List notes for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of project notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectNote"
    post:
      operationId: createProjectNote
      tags: [projects]
      summary: Create a note for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectNoteBody"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectNote"

  /projects/{id}/notes/{noteId}:
    delete:
      operationId: deleteProjectNote
      tags: [projects]
      summary: Delete a project note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: noteId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /emails/{id}/handled:
    post:
      operationId: markEmailHandled
      tags: [emails]
      summary: Mark an email as handled (Task #205)
      description: |
        Marque l'email comme traité (handled_at + handled_by). Action humaine
        explicite. Renvoie 503 si la migration handled_at/handled_by n'a pas
        été appliquée. Renvoie 403 si l'utilisateur n'a pas accès à l'email
        (ni propriétaire, ni membre de l'org propriétaire de la boîte
        partagée liée).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email marked as handled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  handledAt:
                    type: string
                    format: date-time
                  handledBy:
                    type: string
                    format: uuid
        "403":
          description: User cannot handle this email
        "503":
          description: Handled columns missing — migration not applied
    delete:
      operationId: unmarkEmailHandled
      tags: [emails]
      summary: Unmark an email as handled (Task #205)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email unmarked
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "403":
          description: User cannot unhandle this email
        "503":
          description: Handled columns missing — migration not applied

  /emails/{id}/snooze:
    post:
      operationId: snoozeEmail
      tags: [emails]
      summary: Snooze an email until a future date
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnoozeEmailBody"
      responses:
        "200":
          description: Email snoozed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  snoozedUntil:
                    type: string
                    format: date-time

  /emails/{id}/unsnooze:
    post:
      operationId: unsnoozeEmail
      tags: [emails]
      summary: Wake a snoozed email immediately
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email unsnoozed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /emails/schedule:
    post:
      operationId: scheduleEmail
      tags: [emails]
      summary: Schedule an email to be sent at a future date
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleEmailBody"
      responses:
        "200":
          description: Email scheduled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  scheduledEmailId:
                    type: integer
                  scheduledSendAt:
                    type: string
                    format: date-time

  /emails/scheduled:
    get:
      operationId: listScheduledEmails
      tags: [emails]
      summary: List pending scheduled emails
      responses:
        "200":
          description: Scheduled emails
          content:
            application/json:
              schema:
                type: object
                properties:
                  emails:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScheduledEmail"
                required:
                  - emails

  /emails/scheduled/{id}:
    delete:
      operationId: cancelScheduledEmail
      tags: [emails]
      summary: Cancel a scheduled email
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled
          content:
