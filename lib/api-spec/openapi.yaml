openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: NCV Mail API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: emails
    description: Email operations
  - name: categories
    description: Category operations
  - name: tasks
    description: Task operations
  - name: profile
    description: User profile operations
  - name: dashboard
    description: Dashboard summary operations
  - name: projects
    description: Project management operations
  - name: ai
    description: AI operations
  - name: followups
    description: Follow-up tracking operations
  - name: export
    description: Data export operations
  - name: paddle
    description: Paddle payment operations
  - name: integrations
    description: Slack and Notion integration operations
  - name: organisations
    description: Organisation and team management operations
  - name: shared-mailboxes
    description: Shared mailbox operations
  - name: notifications
    description: Notification operations
  - name: team
    description: Team dashboard operations
  - name: appointments
    description: Appointment/calendar operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid input

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

    patch:
      operationId: updateProfile
      tags: [profile]
      summary: Update profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /profile/push-token:
    post:
      operationId: registerPushToken
      tags: [profile]
      summary: Register push notification token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPushTokenBody"
      responses:
        "200":
          description: Token registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /emails:
    get:
      operationId: listEmails
      tags: [emails]
      summary: List emails
      parameters:
        - name: priority
          in: query
          schema:
            type: string
            enum: [urgent, moyen, faible]
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [non_lu, read, unread, archived, trashed, spam]
        - name: q
          in: query
          schema:
            type: string
          description: Search term to filter emails by subject, sender or summary
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number (1-indexed)
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
          description: Number of emails per page
      responses:
        "200":
          description: Paginated list of emails
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedEmails"

  /emails/{id}:
    get:
      operationId: getEmail
      tags: [emails]
      summary: Get single email
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Email"
        "404":
          description: Not found

    patch:
      operationId: updateEmail
      tags: [emails]
      summary: Update email category or status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmailBody"
      responses:
        "200":
          description: Updated email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Email"

    delete:
      operationId: deleteEmail
      tags: [emails]
      summary: Delete an email
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /emails/{id}/restore:
    post:
      operationId: restoreEmail
      tags: [emails]
      summary: Restore a trashed email to inbox
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email restored
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /emails/{id}/permanent:
    delete:
      operationId: permanentDeleteEmail
      tags: [emails]
      summary: Permanently delete a trashed email
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email permanently deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /emails/trash/empty:
    delete:
      operationId: emptyTrash
      tags: [emails]
      summary: Permanently delete all trashed emails
      responses:
        "200":
          description: Trash emptied
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /emails/spam/empty:
    delete:
      operationId: emptySpam
      tags: [emails]
      summary: Permanently delete all spam emails
      responses:
        "200":
          description: Spam emptied
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /emails/bulk:
    post:
      operationId: bulkUpdateEmails
      tags: [emails]
      summary: Bulk update emails (archive, mark read, delete)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
                - action
              properties:
                ids:
                  type: array
                  items:
                    type: integer
                action:
                  type: string
                  enum: [delete, archive, read]
      responses:
        "200":
          description: Bulk action result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  affected:
                    type: integer

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

    post:
      operationId: createCategory
      tags: [categories]
      summary: Create category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryBody"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /categories/apply-pack:
    post:
      operationId: applyPack
      tags: [categories]
      summary: Apply a profession pack (bulk insert categories)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyPackBody"
      responses:
        "200":
          description: Pack applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplyPackResponse"

  /categories/generate-pack:
    post:
      operationId: generatePack
      tags: [categories]
      summary: Generate a custom pack via AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratePackBody"
      responses:
        "200":
          description: Generated pack
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratePackResponse"

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [all, pending, done]
        - name: scope
          in: query
          description: |
            mine (default) = tasks I created or am assigned to;
            assigned_to_me = only tasks assigned to me;
            created_by_me = only tasks I created;
            team = all tasks of my organisation members.
          schema:
            type: string
            enum: [mine, assigned_to_me, created_by_me, team]
        - name: projectId
          in: query
          description: Restrict to tasks of a given project.
          schema:
            type: string
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update task (toggle done)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/inbox-health:
    get:
      operationId: getInboxHealth
      tags: [dashboard]
      summary: Inbox health score
      responses:
        "200":
          description: Inbox health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboxHealth"

  /dashboard/category-counts:
    get:
      operationId: getCategoryCounts
      tags: [dashboard]
      summary: Email counts per category
      responses:
        "200":
          description: Category counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryCount"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

    post:
      operationId: createProject
      tags: [projects]
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project with emails and tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          description: Not found

    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectBody"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /projects/{id}/notes:
    get:
      operationId: listProjectNotes
      tags: [projects]
      summary: List notes for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of project notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectNote"
    post:
      operationId: createProjectNote
      tags: [projects]
      summary: Create a note for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectNoteBody"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectNote"

  /projects/{id}/notes/{noteId}:
    delete:
      operationId: deleteProjectNote
      tags: [projects]
      summary: Delete a project note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: noteId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /emails/send:
    post:
      operationId: sendEmail
      tags: [emails]
      summary: Send an email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendEmailBody"
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "400":
          description: Missing fields or no connected account

  /ai/daily-summary:
    post:
      operationId: generateDailySummary
      tags: [ai]
      summary: Generate daily summary via AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailySummaryRequest"
      responses:
        "200":
          description: Daily summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailySummary"

  /ai/recategorize-uncategorized:
    post:
      operationId: recategorizeUncategorized
      tags: [ai]
      summary: Re-categorize all uncategorized emails using AI
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                lang:
                  type: string
                  description: User language code (fr, en, nl)
      responses:
        "200":
          description: Recategorization results
          content:
            application/json:
              schema:
                type: object
                properties:
                  recategorized:
                    type: integer
                  created:
                    type: array
                    items:
                      type: string
                required:
                  - recategorized
                  - created

  /ai/draft:
    post:
      operationId: generateDraft
      tags: [ai]
      summary: Generate AI draft reply for an email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateDraftBody"
      responses:
        "200":
          description: AI-generated draft reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftResponse"
        "400":
          description: Missing emailId
        "404":
          description: Email not found

  /emails/{id}/conversation:
    get:
      operationId: getEmailConversation
      tags: [emails]
      summary: Get email conversation thread
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email with conversation thread
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    $ref: "#/components/schemas/Email"
                  thread:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/Email"
                        - type: object
                          properties:
                            role:
                              type: string
                              enum: [sent, received]

  /followups:
    get:
      operationId: listFollowups
      tags: [followups]
      summary: List user followups
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [all, en_attente, relance, termine]
        - name: projectId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of followups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Followup"
    post:
      operationId: createFollowup
      tags: [followups]
      summary: Create a new followup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFollowupBody"
      responses:
        "200":
          description: Created followup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Followup"

  /followups/stats:
    get:
      operationId: getFollowupStats
      tags: [followups]
      summary: Get followup statistics
      responses:
        "200":
          description: Followup stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  en_attente:
                    type: integer
                  relance:
                    type: integer
                  termine:
                    type: integer
                  overdue:
                    type: integer

  /followups/{id}:
    patch:
      operationId: updateFollowup
      tags: [followups]
      summary: Update a followup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFollowupBody"
      responses:
        "200":
          description: Updated followup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Followup"
    delete:
      operationId: deleteFollowup
      tags: [followups]
      summary: Delete a followup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /ai/conversation-summary:
    post:
      operationId: getConversationSummary
      tags: [ai]
      summary: Generate AI summary of email conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                thread:
                  type: array
                  items:
                    type: object
              required: [thread]
      responses:
        "200":
          description: Conversation summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: string

  /export/emails:
    get:
      operationId: exportEmails
      tags: [export]
      summary: Export emails as CSV
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  /export/projects:
    get:
      operationId: exportProjects
      tags: [export]
      summary: Export projects as CSV
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  /export/followups:
    get:
      operationId: exportFollowups
      tags: [export]
      summary: Export followups as CSV
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  /attachments/email/{emailId}:
    get:
      operationId: getEmailAttachments
      tags: [emails]
      summary: Get attachments for an email
      parameters:
        - name: emailId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of attachments
          content:
            application/json:
              schema:
                type: object
                properties:
                  attachments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Attachment"
        "404":
          description: Email not found

  /attachments/{id}/download:
    get:
      operationId: downloadAttachment
      tags: [emails]
      summary: Download an attachment file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Attachment file content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Attachment not found

  /attachments/upload:
    post:
      operationId: uploadAttachments
      tags: [emails]
      summary: Upload files for sending as attachments
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
