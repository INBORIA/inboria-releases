    post:
      operationId: createTemplate
      tags: [templates]
      summary: Create a template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateBody"
      responses:
        "201":
          description: Created template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"

  /templates/{id}:
    patch:
      operationId: updateTemplate
      tags: [templates]
      summary: Update a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTemplateBody"
      responses:
        "200":
          description: Updated template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"
    delete:
      operationId: deleteTemplate
      tags: [templates]
      summary: Delete a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /templates/{id}/use:
    post:
      operationId: incrementTemplateUsage
      tags: [templates]
      summary: Increment template usage counter
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated counter
          content:
            application/json:
              schema:
                type: object
                required: [ok, usageCount]
                properties:
                  ok: { type: boolean }
                  usageCount: { type: integer }

  /templates/from-email/{emailId}:
    post:
      operationId: createTemplateFromEmail
      tags: [templates]
      summary: Create a template from an existing email (AI-categorized)
      parameters:
        - name: emailId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        "201":
          description: Created template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"

  /templates/suggest-name:
    post:
      operationId: suggestTemplateName
      tags: [templates]
      summary: AI-suggest a short name for a template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subject: { type: string }
                body: { type: string }
                sourceEmailId: { type: integer }
      responses:
        "200":
          description: Suggested template name
          content:
            application/json:
              schema:
                type: object
                required: [name]
                properties:
                  name: { type: string }

  /templates/suggest:
    get:
      operationId: suggestTemplates
      tags: [templates]
      summary: AI-suggest 1-3 templates relevant to a given email
      parameters:
        - in: query
          name: emailId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Suggested templates
          content:
            application/json:
              schema:
                type: object
                required: [cached, templates]
                properties:
                  cached: { type: boolean }
                  templates:
                    type: array
                    items:
                      $ref: "#/components/schemas/EmailTemplate"

  /automation-rules:
    get:
      operationId: listAutomationRules
      tags: [automation-rules]
      summary: List user automation rules
      responses:
        "200":
          description: List of rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutomationRule"
    post:
      operationId: createAutomationRule
      tags: [automation-rules]
      summary: Create an automation rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAutomationRuleBody"
      responses:
        "201":
          description: Created rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRule"

  /automation-rules/{id}:
    patch:
      operationId: updateAutomationRule
      tags: [automation-rules]
      summary: Update an automation rule
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAutomationRuleBody"
      responses:
        "200":
          description: Updated rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRule"
    delete:
      operationId: deleteAutomationRule
      tags: [automation-rules]
      summary: Delete an automation rule
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /automation-rules/parse:
    post:
      operationId: parseAutomationRule
      tags: [automation-rules]
      summary: Parse a natural-language instruction into a structured rule (preview, not saved)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [input]
              properties:
                input: { type: string }
                name: { type: string }
      responses:
        "200":
          description: Parsed rule
          content:
            application/json:
              schema:
                type: object
                required: [source, rule]
                properties:
                  source:
                    type: string
                    enum: [heuristic, ai]
                  rule:
                    $ref: "#/components/schemas/AutomationRuleDraft"

  /automation-rules/simulate:
    post:
      operationId: simulateAutomationRule
      tags: [automation-rules]
      summary: Simulate a rule against the user's last 100 emails
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conditions]
              properties:
                conditions:
                  $ref: "#/components/schemas/RuleConditions"
      responses:
        "200":
          description: Simulation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationResult"

  /automation-rules/audit:
    get:
      operationId: listAutomationRuleAudit
      tags: [automation-rules]
      summary: List rule executions in the last 24h (rollback window)
      responses:
        "200":
          description: Audit list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RuleAuditEntry"

  /automation-rules/audit/{id}/rollback:
    post:
      operationId: rollbackRuleExecution
      tags: [automation-rules]
      summary: Rollback a single executed action (within 24h)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Rolled back
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }

  /contacts/search:
    get:
      operationId: searchContacts
      tags: [contacts]
      summary: Search contacts aggregated from emails
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: categoryIds
          in: query
          description: Comma-separated category ids
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Contacts list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactSearchResponse"

  /contacts/{email}/timeline:
    get:
      operationId: getContactTimeline
      tags: [contacts]
      summary: Full chronological timeline for a contact
      parameters:
        - name: email
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactTimelineResponse"

  /contacts/manual:
    get:
      operationId: listManualContacts
      tags: [contacts]
      summary: List manual contacts
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ManualContact" }
    post:
      operationId: createManualContact
      tags: [contacts]
      summary: Create a manual contact
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ManualContactInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ManualContact" }
        "400":
          description: Invalid input
        "409":
          description: Duplicate

  /contacts/manual/{id}:
    patch:
      operationId: updateManualContact
      tags: [contacts]
      summary: Update a manual contact
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ManualContactInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ManualContact" }
    delete:
      operationId: deleteManualContact
      tags: [contacts]
      summary: Delete a manual contact
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }

  /folders:
    get:
      operationId: listFolders
      tags: [folders]
      summary: List user folders (private — never visible to colleagues)
      responses:
        "200":
          description: List of folders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserFolder"
    post:
      operationId: createFolder
      tags: [folders]
      summary: Create a personal folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFolderBody"
      responses:
        "201":
          description: Created folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserFolder"

  /folders/{id}:
    patch:
      operationId: updateFolder
      tags: [folders]
      summary: Update a folder
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFolderBody"
      responses:
        "200":
          description: Updated folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserFolder"
    delete:
      operationId: deleteFolder
      tags: [folders]
      summary: Delete a folder (does not delete emails)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /folders/{id}/emails:
    get:
      operationId: listFolderEmails
      tags: [folders]
      summary: List emails currently assigned to a folder
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
      responses:
        "200":
          description: Folder emails
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderEmailsResponse"

  /folders/generate-prompt:
    post:
      operationId: generateFolderPrompt
      tags: [folders]
      summary: Enrich keywords/short brief into a complete classification prompt via gpt-4o-mini
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateFolderPromptBody"
      responses:
        "200":
          description: Generated prompt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateFolderPromptResponse"

  /folders/assign:
    post:
      operationId: assignEmailsToFolder
      tags: [folders]
      summary: Manually assign one or many emails to a folder (drag-and-drop / context menu)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignFolderBody"
      responses:
        "200":
          description: Assigned
          content:
            application/json:
              schema:
                type: object
                required: [assigned]
                properties:
                  assigned: { type: integer }

  /folders/unassign:
    post:
      operationId: unassignEmailsFromFolder
      tags: [folders]
      summary: Remove emails from a folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignFolderBody"
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                type: object
                required: [removed]
                properties:
                  removed: { type: integer }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RegisterBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        fullName:
          type: string
        country:
          type: string
          minLength: 2
          maxLength: 2
          description: ISO 3166-1 alpha-2 country code (EU/EEE + CH only)
      required:
        - email
        - password
        - fullName
        - country

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserProfile"
      required:
        - user

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        fullName:
          type: string
        plan:
          type: string
        seats:
          type: integer
        emailsUsed:
          type: integer
        aiCreditsUsed:
          type: integer
          default: 0
        emailsQuota:
          type: integer
        quotaPeriodStart:
          type: ["string", "null"]
          format: date-time
        aiLanguage:
          type: string
          enum: [fr, en, nl]
          default: fr
        signature:
          type: string
          default: ""
        timezone:
          type: string
          default: "Europe/Brussels"
        createdAt:
          type: string
          format: date-time
        organisationId:
          type: ["string", "null"]
        organisationName:
          type: ["string", "null"]
        organisationRole:
          type: ["string", "null"]
          enum: [admin, member, null]
        isAdmin:
          type: boolean
          default: false
          description: True when the profile has the internal admin flag.
        followUpDelayDays:
          type: integer
          default: 5
          minimum: 1
          maximum: 60
          description: Délai par défaut (en jours) avant de suggérer une relance sur un mail envoyé sans réponse.
        trackingEnabled:
          type: boolean
          default: false
          description: True if the user opted in to read-receipt tracking pixels on sent emails.
        meetingRemindersEnabled:
          type: boolean
          default: true
          description: True if Inboria should auto-send a +48h reminder to contacts who haven't replied to a meeting proposal (RDV Phase 3).
        preferredVideoProvider:
          type: string
          enum: [meet, teams, jitsi, none]
          default: none
          description: Fournisseur visio par défaut pour les nouveaux RDV (RDV Phase 4).
        personalVideoUrl:
          type: ["string", "null"]
          description: Lien visio permanent personnel (Teams ou Meet) utilisé quand le fournisseur choisi est Teams ou Meet. Si null, fallback Jitsi.
      required:
        - id
        - email
        - fullName
        - plan
        - seats
        - emailsUsed
        - emailsQuota
        - createdAt

    UpdateProfileBody:
      type: object
      properties:
        fullName:
          type: string
        plan:
          type: string
        seats:
          type: integer
        aiLanguage:
          type: string
          enum: [fr, en, nl]
        signature:
          type: string
        timezone:
          type: string
        followUpDelayDays:
          type: integer
          minimum: 1
          maximum: 60
        trackingEnabled:
          type: boolean
        meetingRemindersEnabled:
          type: boolean
        preferredVideoProvider:
          type: string
          enum: [meet, teams, jitsi, none]
        personalVideoUrl:
          type: ["string", "null"]

    RegisterPushTokenBody:
      type: object
      required:
        - token
      properties:
        token:
          type: string
        platform:
          type: string

    Email:
      type: object
      properties:
        id:
          type: integer
        sender:
          type: string
        recipient:
          type: ["string", "null"]
        subject:
          type: string
        body:
          type: string
        status:
          type: string
        priority:
          type: string
        summary:
          type: ["string", "null"]
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        projectId:
          type: ["string", "null"]
        projectName:
          type: ["string", "null"]
        projectReference:
          type: ["string", "null"]
        replyToEmailId:
          type: ["integer", "null"]
        assignedTo:
          type: ["string", "null"]
        assignedToName:
          type: ["string", "null"]
        assignedAt:
          type: ["string", "null"]
          format: date-time
        spamSource:
          type: ["string", "null"]
          description: "Origin of the spam classification: 'provider' (filtré côté fournisseur), 'ai' (Inboria IA), 'user' (manuel), null sinon."
        snoozedUntil:
          type: ["string", "null"]
          format: date-time
          description: ISO timestamp until which this email is hidden from the inbox.
        sentAt:
          type: ["string", "null"]
          format: date-time
          description: ISO timestamp when this email was actually sent (set for sent / scheduled-then-sent emails).
        openedAt:
          type: ["string", "null"]
          format: date-time
          description: First time the recipient opened a sent email (tracking pixel hit).
        openedCount:
          type: integer
          default: 0
          description: Number of recorded pixel opens for a sent email.
        attachmentCount:
          type: integer
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/Attachment"
        inboriaScore:
          type: integer
          description: Inboria strategic score (sum of weighted signals). Higher = more strategic.
        inboriaReasons:
          type: array
          items:
            type: string
          description: Human-readable reasons explaining the Inboria score.
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - sender
        - subject
        - status
        - priority
        - createdAt

    Followup:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        emailId:
          type: ["integer", "null"]
        projectId:
          type: ["string", "null"]
        title:
          type: string
        status:
          type: string
          enum: [en_attente, relance, termine]
        dueDate:
          type: ["string", "null"]
          format: date
        notes:
          type: ["string", "null"]
        aiSuggestion:
          type: boolean
        dismissedAt:
          type: ["string", "null"]
          format: date-time
        emails:
          type: object
          nullable: true
        projects:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - status

    CreateFollowupBody:
      type: object
      properties:
        title:
          type: string
        emailId:
          type: integer
        projectId:
          type: string
        status:
          type: string
          enum: [en_attente, relance, termine]
        dueDate:
          type: string
          format: date
        notes:
          type: string
      required:
        - title

    UpdateFollowupBody:
      type: object
      properties:
        title:
          type: string
        status:
          type: string
          enum: [en_attente, relance, termine]
        dueDate:
          type: string
          format: date
        notes:
          type: string
        projectId:
          type: string

    PaginatedEmails:
      type: object
      properties:
        emails:
          type: array
          items:
            $ref: "#/components/schemas/Email"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required:
        - emails
        - total
        - page
        - totalPages

    SendEmailBody:
      type: object
      properties:
        to:
          type: string
          description: Primary recipient(s). Comma or semicolon separated for multiple addresses.
        cc:
          type: ["string", "null"]
          description: Carbon-copy recipient(s). Comma or semicolon separated for multiple addresses.
        bcc:
          type: ["string", "null"]
          description: Blind carbon-copy recipient(s). Comma or semicolon separated for multiple addresses.
        subject:
          type: string
        body:
          type: string
        replyToEmailId:
          type: ["integer", "null"]
        markHandledOfEmailId:
          type: ["integer", "null"]
          description: >-
            Optional email id to mark as "handled" on the server when the send
            succeeds, without populating reply_to_email_id. Used by the forward
            flow so the original email is auto-handled while the outgoing
            message is not classified as a reply.
        connectionId:
          type: ["string", "null"]
        projectId:
          type: ["string", "null"]
        attachments:
          type: array
          items:
            type: string
      required:
        - to
        - subject
        - body

    SnoozeEmailBody:
      type: object
      properties:
        snoozeUntil:
          type: string
          format: date-time
          description: ISO timestamp until which the email should stay hidden from the inbox.
      required:
        - snoozeUntil

    ScheduleEmailBody:
      type: object
      properties:
        to:
          type: string
        subject:
          type: string
        body:
          type: string
        replyToEmailId:
          type: ["integer", "null"]
        markHandledOfEmailId:
          type: ["integer", "null"]
          description: Original email id to mark as handled once the scheduled send succeeds (used for scheduled forwards, which carry no replyToEmailId).
        connectionId:
          type: ["string", "null"]
        projectId:
          type: ["string", "null"]
        scheduledSendAt:
          type: string
          format: date-time
          description: ISO timestamp at which to send the email (must be in the future).
        attachments:
          type: array
          description: Optional list of upload IDs (returned by /uploads) to attach to the scheduled email.
          items:
            type: string
      required:
        - to
        - subject
        - body
        - scheduledSendAt

    CancelPendingSendBody:
      type: object
      properties:
        pendingId:
          type: string
          description: Client-generated identifier for a pending send within its 10-second undo window.
      required:
        - pendingId

    ScheduledEmail:
      type: object
      properties:
        id:
          type: integer
        recipient:
          type: ["string", "null"]
        subject:
          type: string
        body:
          type: string
        scheduledSendAt:
          type: string
          format: date-time
        replyToEmailId:
          type: ["integer", "null"]
        projectId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - subject
        - body
        - scheduledSendAt
        - createdAt

    UploadedFileInfo:
      type: object
      properties:
        uploadId:
          type: string
        filename:
          type: string
        contentType:
          type: string
        size:
          type: integer
      required:
        - uploadId
        - filename
        - contentType
        - size

    Attachment:
      type: object
      properties:
        id:
          type: string
        filename:
          type: string
        content_type:
          type: string
        size:
          type: integer
        created_at:
          type: string
          format: date-time
      required:
        - id
        - filename
        - content_type
        - size

    UpdateEmailBody:
      type: object
      properties:
        categoryId:
          type: ["integer", "null"]
        status:
          type: string
        projectId:
          type: ["string", "null"]

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        emailCount:
          type: integer
        sourcePack:
          type: ["string", "null"]
