                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RegisterBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        fullName:
          type: string
        country:
          type: string
          minLength: 2
          maxLength: 2
          description: ISO 3166-1 alpha-2 country code (EU/EEE + CH only)
      required:
        - email
        - password
        - fullName
        - country

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserProfile"
      required:
        - user

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        fullName:
          type: string
        plan:
          type: string
        seats:
          type: integer
        emailsUsed:
          type: integer
        aiCreditsUsed:
          type: integer
          default: 0
        emailsQuota:
          type: integer
        quotaPeriodStart:
          type: ["string", "null"]
          format: date-time
        aiLanguage:
          type: string
          enum: [fr, en, nl]
          default: fr
        signature:
          type: string
          default: ""
        timezone:
          type: string
          default: "Europe/Brussels"
        createdAt:
          type: string
          format: date-time
        organisationId:
          type: ["string", "null"]
        organisationName:
          type: ["string", "null"]
        organisationRole:
          type: ["string", "null"]
          enum: [admin, member, null]
        isAdmin:
          type: boolean
          default: false
          description: True when the profile has the internal admin flag.
        followUpDelayDays:
          type: integer
          default: 5
          minimum: 1
          maximum: 60
          description: Délai par défaut (en jours) avant de suggérer une relance sur un mail envoyé sans réponse.
        trackingEnabled:
          type: boolean
          default: false
          description: True if the user opted in to read-receipt tracking pixels on sent emails.
      required:
        - id
        - email
        - fullName
        - plan
        - seats
        - emailsUsed
        - emailsQuota
        - createdAt

    UpdateProfileBody:
      type: object
      properties:
        fullName:
          type: string
        plan:
          type: string
        seats:
          type: integer
        aiLanguage:
          type: string
          enum: [fr, en, nl]
        signature:
          type: string
        timezone:
          type: string
        followUpDelayDays:
          type: integer
          minimum: 1
          maximum: 60
        trackingEnabled:
          type: boolean

    RegisterPushTokenBody:
      type: object
      required:
        - token
      properties:
        token:
          type: string
        platform:
          type: string

    Email:
      type: object
      properties:
        id:
          type: integer
        sender:
          type: string
        recipient:
          type: ["string", "null"]
        subject:
          type: string
        body:
          type: string
        status:
          type: string
        priority:
          type: string
        summary:
          type: ["string", "null"]
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        projectId:
          type: ["string", "null"]
        projectName:
          type: ["string", "null"]
        projectReference:
          type: ["string", "null"]
        replyToEmailId:
          type: ["integer", "null"]
        assignedTo:
          type: ["string", "null"]
        assignedToName:
          type: ["string", "null"]
        assignedAt:
          type: ["string", "null"]
          format: date-time
        spamSource:
          type: ["string", "null"]
          description: "Origin of the spam classification: 'provider' (filtré côté fournisseur), 'ai' (Inboria IA), 'user' (manuel), null sinon."
        snoozedUntil:
          type: ["string", "null"]
          format: date-time
          description: ISO timestamp until which this email is hidden from the inbox.
        sentAt:
          type: ["string", "null"]
          format: date-time
          description: ISO timestamp when this email was actually sent (set for sent / scheduled-then-sent emails).
        openedAt:
          type: ["string", "null"]
          format: date-time
          description: First time the recipient opened a sent email (tracking pixel hit).
        openedCount:
          type: integer
          default: 0
