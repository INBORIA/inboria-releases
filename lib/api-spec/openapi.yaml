            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /export/appointments:
    get:
      operationId: exportAppointments
      tags: [export]
      summary: Export appointments as CSV
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  /waitlist:
    post:
      operationId: joinWaitlist
      tags: [waitlist]
      summary: Subscribe to the payments waitlist
      description: Public endpoint that records an email for the future payment plans launch.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WaitlistSignupBody"
      responses:
        "200":
          description: Signup recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "400":
          description: Invalid email

