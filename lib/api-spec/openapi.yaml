    AdminPaddleMetrics:
      type: object
      required:
        - paddleConfigured
        - webhookConfigured
        - priceIdsConfigured
        - currency
        - plans
        - mrrTotal
        - arrTotal
        - activeSubscribers
        - trialUsers
        - expiredUsers
      properties:
        paddleConfigured:
          type: boolean
          description: True if PADDLE_API_KEY is set.
        webhookConfigured:
          type: boolean
          description: True if PADDLE_WEBHOOK_SECRET is set.
        priceIdsConfigured:
          type: object
          required: [solo, pro, business]
          properties:
            solo: { type: boolean }
            pro: { type: boolean }
            business: { type: boolean }
        currency:
          type: string
          example: EUR
        plans:
          type: array
          items:
            type: object
            required: [id, label, count, monthlyPrice, mrrContribution]
            properties:
              id:
                type: string
                enum: [essai, solo, pro, business]
              label:
                type: string
              count:
                type: integer
              monthlyPrice:
                type: number
                description: Monthly price in main currency unit (e.g. EUR).
              mrrContribution:
                type: number
                description: count × monthlyPrice (in main currency unit).
        mrrTotal:
          type: number
        arrTotal:
          type: number
        activeSubscribers:
          type: integer
          description: Sum of solo + pro + business.
        trialUsers:
          type: integer
        expiredUsers:
          type: integer
        pastDueCount:
          type: ["integer", "null"]
          description: Number of subscriptions in past_due status (null if Paddle API unavailable; capped to PAST_DUE_CAP).
        pastDueCountCapped:
          type: boolean
          description: True if pastDueCount hit the server-side cap (real count may be higher).
        paddleApiError:
          type: ["string", "null"]
          description: Error message if Paddle SDK call failed (e.g. missing key).
        lastWebhookAt:
          type: ["string", "null"]
          format: date-time
          description: Timestamp of last received Paddle webhook (null if unknown / no audit table).
        degraded:
          type: boolean
          description: True if at least one Supabase plan count failed — MRR/counts may under-report.
        degradedReason:
          type: ["string", "null"]
          description: Concatenated error messages explaining degraded state.

    AdminBrevoMetrics:
      type: object
      required: [configured, smtpConfigured]
      properties:
        configured:
          type: boolean
          description: True if BREVO_API_KEY is set.
        smtpConfigured:
          type: boolean
        accountEmail:
          type: ["string", "null"]
        planType:
          type: ["string", "null"]
        emailCredits:
          type: ["number", "null"]
        smsCredits:
          type: ["number", "null"]
        last30:
          type: ["object", "null"]
          required: [requests, delivered, hardBounces, softBounces, complaints, blocked, deliveryRate]
          properties:
            requests: { type: integer }
            delivered: { type: integer }
            hardBounces: { type: integer }
            softBounces: { type: integer }
            complaints: { type: integer }
            blocked: { type: integer }
            deliveryRate:
              type: number
              description: Percentage delivered/requests, 1 decimal.
        errorMessage:
          type: ["string", "null"]

    AdminOpenAIMetrics:
      type: object
      required: [configured, modelsReachable, pricingCoverage]
      properties:
        configured:
          type: boolean
        modelsReachable:
          type: boolean
        errorMessage:
          type: ["string", "null"]
        pricingCoverage:
          type: array
          items: { type: string }
          description: List of model names for which we have local pricing data.
        last30:
          type: ["object", "null"]
          required: [totalRequests, byModel, fallbackCount, fallbackRate, reformulationCount, reformulationRate, totalEstimatedCostUsd]
          properties:
            totalRequests: { type: integer }
            byModel:
              type: array
              items:
                type: object
                required: [model, count, avgLatencyMs, avgResponseLen, estimatedCostUsd]
                properties:
                  model: { type: string }
                  count: { type: integer }
                  avgLatencyMs: { type: integer }
                  avgResponseLen: { type: integer }
                  estimatedCostUsd: { type: number }
            fallbackCount: { type: integer }
            fallbackRate: { type: number }
            reformulationCount: { type: integer }
            reformulationRate: { type: number }
            totalEstimatedCostUsd: { type: number }

