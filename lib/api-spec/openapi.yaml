  /admin/users/{userId}/cancel-subscription:
    post:
      operationId: adminCancelUserSubscription
      tags: [admin]
      summary: Cancel a user's subscription (admin only)
      description: |
        Revokes the user's local access immediately in all successful paths
        (plan set to `expired`, organisation seat freed). The `mode` parameter
        only controls how Paddle is told to stop billing: `at_period_end` lets
        the current billing period run out before Paddle stops charging,
        `immediate` cancels in Paddle right away. If Paddle rejects the
        cancellation, the endpoint returns 502 and no local change is applied.
        Beta testers without a Paddle subscription skip the Paddle call.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCancelSubscriptionBody"
      responses:
        "200":
          description: Cancellation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCancelSubscriptionResult"
        "403":
          description: Admin access required
        "404":
          description: User not found

  /admin/users/{userId}/reactivate:
    post:
      operationId: adminReactivateUser
      tags: [admin]
      summary: Reactivate an expired user (admin only)
      description: |
        Sets the user's plan back to the requested value (defaults to
        `essai`) and resets quota counters. No Paddle call — for paid
        subscriptions the user must resubscribe themselves.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminReactivateUserBody"
      responses:
        "200":
          description: User reactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminReactivateUserResult"
        "403": { description: Admin access required }
        "404": { description: User not found }

