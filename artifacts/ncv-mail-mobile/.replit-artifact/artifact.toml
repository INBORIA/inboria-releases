kind = "mobile"
previewPath = "/ncv-mail-mobile/"
title = "NCV Mail Mobile"
version = "1.0.0"
id = "artifacts/ncv-mail-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/ncv-mail-mobile/" ]
localPort = 20982

[services.development]
run = "pnpm --filter @workspace/ncv-mail-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ncv-mail-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/ncv-mail-mobile", "run", "serve" ]

[services.env]
PORT = "20982"
BASE_PATH = "/ncv-mail-mobile/"
