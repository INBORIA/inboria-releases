<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inboria</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
      :root {
        --bg: #0b1220;
        --panel: #111a2e;
        --panel-2: #0f1729;
        --border: rgba(255, 255, 255, 0.08);
        --text: #e7ecf5;
        --muted: #93a1b9;
        --primary: #8b5cf6;
        --primary-2: #d946ef;
        --danger: #f87171;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        font-size: 13px;
      }
      #app { display: flex; flex-direction: column; height: 100vh; }
      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--panel-2);
      }
      .brand img { width: 22px; height: 22px; border-radius: 6px; }
      .brand b { font-size: 14px; letter-spacing: 0.2px; }
      .brand .tag {
        margin-left: auto;
        font-size: 10px;
        color: var(--muted);
      }
      .hidden { display: none !important; }
      .pad { padding: 14px; }
      .muted { color: var(--muted); }
      .small { font-size: 11px; }
      label { display: block; font-size: 11px; color: var(--muted); margin: 10px 0 4px; }
      input[type="email"], input[type="password"], textarea {
        width: 100%;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        padding: 9px 10px;
        font-size: 13px;
        outline: none;
        resize: none;
      }
      input:focus, textarea:focus { border-color: var(--primary); }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        border: none;
        border-radius: 8px;
        padding: 9px 12px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        color: #fff;
        background: linear-gradient(135deg, var(--primary), var(--primary-2));
        width: 100%;
      }
      .btn:disabled { opacity: 0.5; cursor: default; }
      .btn-ghost {
        background: var(--panel);
        border: 1px solid var(--border);
        color: var(--text);
        font-weight: 500;
        width: auto;
      }
      .btn-ghost:hover { border-color: var(--primary); }
      .err { color: var(--danger); font-size: 11px; margin-top: 8px; min-height: 14px; }
      /* chat */
      .quick {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        padding: 10px 14px 0;
      }
      .chip {
        font-size: 11px;
        padding: 6px 9px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
      }
      .chip:hover { border-color: var(--primary); }
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .msg { max-width: 92%; padding: 9px 11px; border-radius: 12px; line-height: 1.45; white-space: pre-wrap; word-wrap: break-word; }
      .msg.user { align-self: flex-end; background: linear-gradient(135deg, var(--primary), var(--primary-2)); color: #fff; border-bottom-right-radius: 4px; }
      .msg.bot { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
      .msg.bot.typing { color: var(--muted); font-style: italic; }
      .composer {
        display: flex;
        gap: 8px;
        padding: 10px 14px;
        border-top: 1px solid var(--border);
        background: var(--panel-2);
        align-items: flex-end;
      }
      .composer textarea { flex: 1; max-height: 110px; }
      .composer .send {
        width: 38px; height: 38px; min-width: 38px; padding: 0; border-radius: 10px;
      }
      .topbar {
        display: flex; align-items: center; gap: 8px;
        padding: 8px 14px; border-bottom: 1px solid var(--border);
      }
      .topbar .open {
        font-size: 11px; padding: 6px 10px; border-radius: 8px;
        border: 1px solid var(--border); background: var(--panel); color: var(--text);
        cursor: pointer;
      }
      .topbar .open:hover { border-color: var(--primary); }
      .topbar .logout { margin-left: auto; font-size: 11px; color: var(--muted); background: none; border: none; cursor: pointer; }
      .topbar .logout:hover { color: var(--text); }
      .center { display: flex; flex-direction: column; justify-content: center; height: 100%; }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="brand">
        <img id="brandLogo" alt="Inboria" />
        <b>Inboria</b>
        <span class="tag">Demander à Inboria</span>
      </div>

      <!-- LOADING -->
      <div id="view-loading" class="pad center">
        <p class="muted" style="text-align:center">Chargement…</p>
      </div>

      <!-- LOGIN -->
      <div id="view-login" class="pad center hidden">
        <p class="muted small" style="margin-top:0">
          Connectez-vous avec votre compte Inboria pour utiliser l'assistant
          directement dans Outlook.
        </p>
        <label for="email">Adresse email</label>
        <input id="email" type="email" autocomplete="username" placeholder="vous@entreprise.com" />
        <label for="password">Mot de passe</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
        <div style="height:12px"></div>
        <button id="loginBtn" class="btn">Se connecter</button>
        <div id="loginErr" class="err"></div>
      </div>

      <!-- CHAT -->
      <div id="view-chat" class="hidden" style="display:flex;flex-direction:column;flex:1;min-height:0">
        <div class="topbar">
          <button id="openInApp" class="open">↗ Ouvrir dans Inboria</button>
          <button id="clearChatBtn" class="logout">Effacer</button>
          <button id="logoutBtn" class="logout">Déconnexion</button>
        </div>
        <div class="quick">
          <button class="chip" data-q="summarize">Résumer ce mail</button>
          <button class="chip" data-q="reply">Proposer une réponse</button>
          <button class="chip" data-q="todo">Que dois-je faire ?</button>
        </div>
        <div id="messages"></div>
        <div class="composer">
          <textarea id="input" rows="1" placeholder="Posez votre question à Inboria…"></textarea>
          <button id="sendBtn" class="btn send" title="Envoyer">➤</button>
        </div>
      </div>
    </div>

    <script src="taskpane.js"></script>
  </body>
</html>
