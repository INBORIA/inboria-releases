<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demander à Inboria</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img id="brandLogo" src="icon-128.png" alt="" />
        <span>Demander à Inboria</span>
      </div>
      <button id="closeBtn" class="icon-btn" title="Fermer" type="button">✕</button>
    </header>

    <!-- Vue : chargement -->
    <section id="view-loading" class="view">
      <p class="muted center">Connexion à Inboria…</p>
    </section>

    <!-- Vue : connexion -->
    <section id="view-login" class="view hidden">
      <p class="muted">Connectez-vous avec votre compte Inboria pour utiliser l'assistant dans votre webmail.</p>
      <label class="field">
        <span>Adresse email</span>
        <input id="email" type="email" autocomplete="username" />
      </label>
      <label class="field">
        <span>Mot de passe</span>
        <input id="password" type="password" autocomplete="current-password" />
      </label>
      <p id="loginErr" class="error"></p>
      <button id="loginBtn" class="primary" type="button">Se connecter</button>
    </section>

    <!-- Vue : chat -->
    <section id="view-chat" class="view hidden">
      <div class="chips">
        <button class="chip" data-q="summarize" type="button">Résumer ce mail</button>
        <button class="chip" data-q="reply" type="button">Proposer une réponse</button>
        <button class="chip" data-q="todo" type="button">Que dois-je faire ?</button>
        <button id="openInApp" class="chip ghost" type="button">↗ Ouvrir Inboria</button>
      </div>
      <div id="messages" class="messages"></div>
      <div class="composer">
        <textarea id="input" rows="1" placeholder="Posez votre question…"></textarea>
        <button id="sendBtn" class="primary" type="button">Envoyer</button>
      </div>
      <div class="footer">
        <span id="userEmail" class="muted small"></span>
        <span class="footer-actions">
          <button id="clearChatBtn" class="link" type="button">Effacer la conversation</button>
          <button id="logoutBtn" class="link" type="button">Déconnexion</button>
        </span>
      </div>
    </section>

    <script src="panel.js"></script>
  </body>
</html>
