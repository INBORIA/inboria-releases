appId: io.inboria.desktop
productName: Inboria
copyright: Copyright © Inboria

directories:
  output: release
  buildResources: build

files:
  - src/**/*
  - package.json

# Windows : installateur classique (.exe) modifiable par l'utilisateur.
win:
  target:
    - nsis
  icon: build/icon.png
  # Nom de fichier STABLE (sans numéro de version) → URL de téléchargement direct fixe.
  artifactName: ${productName}-Setup-Windows.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Inboria

# macOS : .dmg (glisser-déposer) + .zip (pour la mise à jour auto future).
mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  icon: build/icon.png
  # Nom de fichier STABLE (sans numéro de version).
  artifactName: ${productName}-macOS.${ext}

# Linux : AppImage (portable) + .deb (Debian/Ubuntu).
linux:
  target:
    - AppImage
    - deb
  category: Office
  icon: build/icon.png
  # Nom de fichier STABLE (sans numéro de version).
  artifactName: ${productName}-Linux.${ext}
  # electron-builder exige le maintainer pour fabriquer le paquet .deb
  # (sinon : "required to set Linux .deb package maintainer").
  # Le homepage requis par le .deb est lu depuis package.json ("homepage"),
  # ce n'est PAS une propriété valide sous linux: ici.
  maintainer: Inboria <support@inboria.com>
