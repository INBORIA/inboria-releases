appId: io.inboria.desktop
productName: Inboria
copyright: Copyright © Inboria

# Publication GitHub (dépôt PUBLIC) — c'est ce qui alimente la mise à jour
# automatique (electron-updater). Avec ce bloc, electron-builder génère les
# fichiers de métadonnées « latest.yml » (Windows) / « latest-linux.yml »
# (Linux) ET embarque « app-update.yml » dans l'app pour qu'elle sache où
# vérifier les nouvelles versions.
publish:
  provider: github
  owner: INBORIA
  repo: inboria-releases

directories:
  output: release
  buildResources: build

# Association de fichiers : l'app s'enregistre auprès de l'OS comme lecteur
# de fichiers .eml (mails exportés par glisser-déposer depuis Inboria).
# Windows/Linux : proposée dans « Ouvrir avec » (l'utilisateur peut la mettre
# par défaut) ; macOS : idem via « Lire les informations ».
fileAssociations:
  - ext: eml
    name: E-mail (RFC 822)
    description: Message e-mail exporté
    mimeType: message/rfc822
    role: Viewer

files:
  - src/**/*
  - package.json

# Windows : installateur classique (.exe) modifiable par l'utilisateur.
win:
  target:
    - nsis
  icon: build/icon.png
  # Nom de fichier STABLE (sans numéro de version) → URL de téléchargement direct fixe.
  artifactName: ${productName}-Setup-Windows.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Inboria

# macOS : .dmg (glisser-déposer) + .zip (pour la mise à jour auto future).
mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  icon: build/icon.png
  # Nom de fichier STABLE (sans numéro de version).
  artifactName: ${productName}-macOS.${ext}

# Linux : AppImage (portable) + .deb (Debian/Ubuntu).
linux:
  target:
    - AppImage
    - deb
  category: Office
  icon: build/icon.png
  # Nom de fichier STABLE (sans numéro de version).
  artifactName: ${productName}-Linux.${ext}
  # electron-builder exige le maintainer pour fabriquer le paquet .deb
  # (sinon : "required to set Linux .deb package maintainer").
  # Le homepage requis par le .deb est lu depuis package.json ("homepage"),
  # ce n'est PAS une propriété valide sous linux: ici.
  maintainer: Inboria <support@inboria.com>
